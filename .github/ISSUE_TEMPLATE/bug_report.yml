name: Bug Report
description: Report a bug in Darwin
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `darwin ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Darwin version
      description: Output of `darwin --version` or `npm list darwin-agents`
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - Claude CLI
        - Anthropic API
        - OpenAI API
        - Ollama
        - Other
    validations:
      required: true

  - type: dropdown
    id: memory
    attributes:
      label: Memory backend
      options:
        - SQLite (default)
        - PostgreSQL
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant error messages or logs.
      render: shell
